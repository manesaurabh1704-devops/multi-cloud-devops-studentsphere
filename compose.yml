version: "3.8"

services:

  # Database - MariaDB
  db:
    image: mariadb:10.11
    container_name: studentsphere-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME:-student_db}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Backend - Spring Boot
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: studentsphere-backend
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      DB_URL: jdbc:mariadb://db:3306/${DB_NAME:-student_db}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    depends_on:
      db:
        condition: service_healthy

  # Frontend - React + Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: studentsphere-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data: